<!DOCTYPE html>
<html lang=en>
    <head>
        <title>A-Frame scene</title>
        <script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
    </head>
    <body>
        <a-scene>
<!--
    Change the scale for each of these shapes. 
    You do not need to modify any other attribues.
    
    <hint> You might want to use these numbers: </hint>
    <hint> 0.5, 3, 5, 1000 </hint>
-->

    <a-box 
        position="-5 5 -3"
        color="orange"
        scale="3 5 0"
    ></a-box>        

    <a-box 
        position="2 3 -2"
        color="green"
        scale="3 0.5 5"
    ></a-box>
    
    <a-cylinder 
        position="5 5 5"
        color="red"
        scale=" 3 1 5"
    ></a-cylinder>
    
    <a-torus 
        position="0 5 -1"
        color="blue"
    ></a-torus>
    
        </a-scene>
    </body>
</html>
